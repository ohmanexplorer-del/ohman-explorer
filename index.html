<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ohman Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --tag-bg: #1f2937;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.5; }
  header { border-bottom: 1px solid var(--border); padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 18px; font-weight: 600; }
  header span { color: var(--muted); font-size: 13px; }
  .controls { padding: 16px 24px; display: flex; gap: 10px; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
  input[type=text], select {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 7px 12px; border-radius: 6px; font-size: 13px; outline: none;
  }
  input[type=text] { flex: 1; min-width: 200px; }
  input[type=text]:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface); }
  .stats { padding: 10px 24px; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--border); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1px; background: var(--border); }
  .card { background: var(--bg); padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; transition: background .15s; }
  .card:hover { background: var(--surface); }
  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .card-title a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 14px; word-break: break-word; }
  .card-title a:hover { text-decoration: underline; }
  .score { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .score-high { background: rgba(63,185,80,.15); color: var(--green); }
  .score-mid  { background: rgba(210,153,34,.15); color: var(--yellow); }
  .score-low  { background: rgba(248,81,73,.15);  color: var(--red); }
  .description { color: var(--muted); font-size: 13px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .notes { color: #6e7681; font-size: 12px; font-style: italic; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .tag { background: var(--tag-bg); color: var(--muted); font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .tag.lang { color: var(--accent); }
  .tag.cat { color: #a371f7; }
  .stars { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .empty { text-align: center; padding: 80px 24px; color: var(--muted); }
  footer { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 1px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>Ohman Explorer</h1>
    <span>Autonomous GitHub project discovery index</span>
  </div>
</header>
<div class="controls">
  <input type="text" id="search" placeholder="Search repositories…" autocomplete="off">
  <select id="category"><option value="">All categories</option></select>
  <select id="lang"><option value="">All languages</option></select>
  <select id="sort">
    <option value="score">Sort: AI Score</option>
    <option value="stars">Sort: Stars</option>
    <option value="name">Sort: Name</option>
  </select>
</div>
<div class="stats" id="stats">Loading…</div>
<div class="grid" id="grid"></div>
<div class="empty" id="empty" style="display:none">No repositories match your filters.</div>
<footer>Powered by <a href="https://github.com/ohmanexplorer-del/ohman-explorer" style="color:var(--accent);text-decoration:none">ohman-explorer</a></footer>
<script>
let allRepos = [];

async function load() {
  const res = await fetch('data/repos.json');
  allRepos = await res.json();
  allRepos = allRepos.filter(r => r.publish !== false);

  const cats = [...new Set(allRepos.map(r => r.category).filter(Boolean))].sort();
  const langs = [...new Set(allRepos.map(r => r.language).filter(Boolean))].sort();

  const catSel = document.getElementById('category');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });

  const langSel = document.getElementById('lang');
  langs.forEach(l => { const o = document.createElement('option'); o.value = l; o.textContent = l; langSel.appendChild(o); });

  render();
}

function scoreClass(s) {
  if (s >= 7.5) return 'score-high';
  if (s >= 5.5) return 'score-mid';
  return 'score-low';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('category').value;
  const lang = document.getElementById('lang').value;
  const sort = document.getElementById('sort').value;

  let list = allRepos.filter(r => {
    if (cat && r.category !== cat) return false;
    if (lang && r.language !== lang) return false;
    if (q) {
      const hay = (r.full_name + ' ' + r.description + ' ' + r.category + ' ' + (r.ai_notes||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'score') return (b.ai_score || 0) - (a.ai_score || 0);
    if (sort === 'stars') return (b.stars || 0) - (a.stars || 0);
    return a.full_name.localeCompare(b.full_name);
  });

  document.getElementById('stats').textContent = `${list.length} of ${allRepos.length} repositories`;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if (list.length === 0) { grid.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';

  grid.innerHTML = list.map(r => {
    const sc = r.ai_score ? r.ai_score.toFixed(1) : '–';
    const cls = r.ai_score ? scoreClass(r.ai_score) : 'score-low';
    const stars = r.stars ? `★ ${r.stars.toLocaleString()}` : '';
    const type = r.project_type && r.project_type !== 'unknown' ? r.project_type : '';
    return `<div class="card">
      <div class="card-header">
        <div class="card-title"><a href="https://github.com/${esc(r.full_name)}" target="_blank" rel="noopener">${esc(r.full_name)}</a></div>
        <span class="score ${cls}">${sc}</span>
      </div>
      ${r.description ? `<div class="description">${esc(r.description)}</div>` : ''}
      ${r.ai_notes ? `<div class="notes">${esc(r.ai_notes)}</div>` : ''}
      <div class="meta">
        ${r.language ? `<span class="tag lang">${esc(r.language)}</span>` : ''}
        ${r.category ? `<span class="tag cat">${esc(r.category)}</span>` : ''}
        ${type ? `<span class="tag">${esc(type)}</span>` : ''}
        ${stars ? `<span class="stars">${stars}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('category').addEventListener('change', render);
document.getElementById('lang').addEventListener('change', render);
document.getElementById('sort').addEventListener('change', render);

load().catch(e => {
  document.getElementById('stats').textContent = 'Failed to load data.';
  console.error(e);
});
</script>
</body>
</html>
